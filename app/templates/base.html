<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Calendly MCP Eval Harness{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css?v={{ style_version() }}">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a href="/" class="brand">Calendly MCP Evals</a>
            {% set path = request.url.path %}
            <nav>
                <a href="/"         {% if path == '/' %}aria-current="page"{% endif %}>Evals</a>
                <a href="/runs"     {% if path.startswith('/runs') %}aria-current="page"{% endif %}>Runs</a>
                <a href="/settings" {% if path.startswith('/settings') %}aria-current="page"{% endif %}>Settings</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script>
        (function formatLocalTimes(root) {
            const opts = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
            (root || document).querySelectorAll('time.local-time[datetime]').forEach(el => {
                const d = new Date(el.getAttribute('datetime'));
                if (!isNaN(d)) {
                    el.textContent = d.toLocaleString(undefined, opts);
                    el.title = d.toLocaleString();
                }
            });
        })();
    </script>
</body>
</html>
